# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# Tomcat thread pool.
# With blocking execution (up to 10s per request), each execution holds a thread.
# 8 semaphore slots × 10s = 8 threads blocked at most on execution.
# Remaining 192 threads handle login, page loads, API reads freely.
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200

# ── Execution concurrency — TWO-GATE model ────────────────────────────────────
#
# Gate 1  execution.max-concurrent  — max simultaneous COMPILATIONS
#   Compilation runs in-process (Java Compiler API) so it's cheap on RAM,
#   but we cap it to bound Tomcat threads and temp-dir growth.
#
# Gate 2  execution.max-processes   — max simultaneous JVM CHILD PROCESSES
#   Each child JVM uses -Xmx128m + ~50MB overhead ≈ 180 MB.
#   This is the real RAM safety valve.  Formula:
#     available = Total RAM - Spring Boot (~900MB) - OS (~500MB)
#     max-processes = floor(available / 180MB)
#
#     4 GB server  →  (4096 - 900 - 500) / 180 = 14  → set 12  (safety margin)
#     8 GB server  →  (8192 - 900 - 500) / 180 = 37  → set 30
#    16 GB server  →  (16384- 900 - 500) / 180 = 83  → set 70
#
# With parallel test-case execution, a single submission with 8 test cases
# will try to spawn 8 JVMs.  Gate 2 queues them so total live processes
# never exceed max-processes, regardless of how many users are active.
execution.max-concurrent=8
execution.max-processes=12

# ── Docker execution ──────────────────────────────────────────────────────────
# Set execution.docker.enabled=true on any host where Docker daemon is running.
# Compile is always done locally (fast, good error messages).
# Only the JVM run step moves into the container.
#
# When enabled:
#   - System.exit() and Runtime.halt() become safe (kill container, not host JVM)
#   - Memory is cgroup-enforced (exit 137 = OOM killed by Docker)
#   - CPU usage is capped at --cpus fraction
#   - Network is fully disabled (--network none)
#   - Fork bombs limited by --pids-limit 64
#
# Render free tier: leave false (no Docker daemon access)
# Home server / VPS / EC2: set true and pull the image first:
#   docker pull eclipse-temurin:17-jre-alpine
execution.docker.enabled=false
execution.docker.image=eclipse-temurin:17-jre-alpine
execution.docker.memory-mb=256
execution.docker.cpus=0.5
execution.docker.timeout-seconds=15

# ── Execution microservice — load-balanced pool ───────────────────────────────
# Single URL (simple):
#   execution.service.url=http://host:8081
# Multiple URLs (manual load balancing, round-robin):
#   execution.service.urls=http://host:8081,http://host:8082,http://host:8083
# Leave both blank to use the built-in local executor.
execution.service.url=${EXECUTION_SERVICE_URL:}
execution.service.urls=${EXECUTION_SERVICE_URLS:}

# ── Auto-scaling — spawn new Docker containers when all instances are full ────
# Requires Docker daemon accessible on the host running the main API.
# When an instance returns HTTP 429 (semaphore full), the load balancer marks it
# BUSY and spawns a fresh execution-service container on the next free port.
# Idle auto-spawned containers are stopped after cooldown-minutes of inactivity.
#
# Render free tier:  autoscale.enabled=false  (no Docker daemon)
# VPS / home server: autoscale.enabled=true   (Docker daemon available)
execution.autoscale.enabled=${AUTOSCALE_ENABLED:false}
execution.autoscale.max-instances=${AUTOSCALE_MAX_INSTANCES:4}
execution.autoscale.image=${AUTOSCALE_IMAGE:execution-service:latest}
execution.autoscale.port-base=${AUTOSCALE_PORT_BASE:8082}
execution.autoscale.cooldown-minutes=${AUTOSCALE_COOLDOWN_MINUTES:5}

# ── Async execution worker ────────────────────────────────────────────────────
# Set WORKER_ENABLED=false on the API-only node (e.g. Render free tier) and
# WORKER_ENABLED=true on the machine that actually runs code (VPS / home server).
# Both point at the same MySQL — the API enqueues, the worker drains.
worker.enabled=${WORKER_ENABLED:true}
worker.poll-interval-ms=400

# Graceful shutdown: wait up to 30s for in-flight requests to complete
# before the JVM exits. Prevents dropped requests during rolling deploys.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Database ──────────────────────────────────────────────────────────────────
# Set DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD in your environment.
# Local dev fallback uses a plain local MySQL instance (no password in URL).
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/devlearn?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP connection pool ──────────────────────────────────────────────────
# Default was 10 connections — at 200 concurrent requests all 10 slots fill instantly.
# 40 connections handles ~200 concurrent requests with typical ~50ms DB roundtrips.
# Do NOT raise this blindly: MySQL default max_connections=151, each pool member holds 1.
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
# Fail fast (30s) rather than queuing indefinitely when all connections busy
spring.datasource.hikari.connection-timeout=30000
# Recycle connections after 10 min to avoid stale-connection issues with MySQL
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=DevLearnPool

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# LOCAL DEV: update (auto-migrates schema on startup — safe for local iteration)
# PRODUCTION: change to 'validate' and run schema migrations manually.
#   Set DDL_AUTO=validate on Render/Railway to prevent Hibernate touching live tables.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JSON ──────────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.learnsystem=INFO
logging.level.org.springframework.web=WARN
# Include MDC fields (requestId, userId) in every log line for traceability
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:--}] [uid:%X{userId:--}] %logger{36} - %msg%n

# ── Actuator (health check for load balancers / AWS ALB) ─────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED in production. Generate with: openssl rand -base64 64
# Set JWT_SECRET env var on Render / Railway / any host.
# The dev fallback is intentionally weak and must be overridden before deploying.
app.jwt.secret=${JWT_SECRET:dev-local-weak-secret-MUST-change-before-production}
app.jwt.expiration-ms=86400000

# ── Google OAuth2 ─────────────────────────────────────────────────────────────
# Set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET env vars on your host.
# The client-id is a non-secret OAuth identifier; the secret MUST be an env var.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── Frontend URL (CORS + OAuth2 redirects) ────────────────────────────────────
# Render env var: FRONTEND_URL
# Local dev:      http://localhost:3000
# Production:     https://devlearner-frontend.onrender.com  (set on Render)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Set CORS_ALLOW_LOCALHOST=false in production to remove localhost from allowed CORS origins.
cors.allow-localhost=${CORS_ALLOW_LOCALHOST:true}

# ── Groq AI (primary — faster, 14 400 req/day free, no card needed) ───────────
# Get free API key at https://console.groq.com
# Set GROQ_API_KEY env var on Render / local. If unset, AI hints are disabled.
groq.api.key=${GROQ_API_KEY:}
# ── Gemini AI (fallback) ───────────────────────────────────────────────────────
# Get free API key at https://aistudio.google.com/app/apikey
# Set GEMINI_API_KEY env var on Render / local. If unset, falls back to OpenAI.
gemini.api.key=${GEMINI_API_KEY:}

# ── OpenAI / ChatGPT (final fallback) ────────────────────────────────────────
# Get API key at https://platform.openai.com/api-keys
# Set env var OPENAI_API_KEY on Render / local
# Used only when both Groq and Gemini fail. gpt-4o-mini is cheapest ($0.15/1M tokens).
openai.api.key=${OPENAI_API_KEY:}
