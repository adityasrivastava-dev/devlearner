# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# Tomcat thread pool.
# With blocking execution (up to 10s per request), each execution holds a thread.
# 8 semaphore slots × 10s = 8 threads blocked at most on execution.
# Remaining 192 threads handle login, page loads, API reads freely.
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200

# ── Execution concurrency — TWO-GATE model ────────────────────────────────────
#
# Gate 1  execution.max-concurrent  — max simultaneous COMPILATIONS
#   Compilation runs in-process (Java Compiler API) so it's cheap on RAM,
#   but we cap it to bound Tomcat threads and temp-dir growth.
#
# Gate 2  execution.max-processes   — max simultaneous JVM CHILD PROCESSES
#   Each child JVM uses -Xmx128m + ~50MB overhead ≈ 180 MB.
#   This is the real RAM safety valve.  Formula:
#     available = Total RAM - Spring Boot (~900MB) - OS (~500MB)
#     max-processes = floor(available / 180MB)
#
#     4 GB server  →  (4096 - 900 - 500) / 180 = 14  → set 12  (safety margin)
#     8 GB server  →  (8192 - 900 - 500) / 180 = 37  → set 30
#    16 GB server  →  (16384- 900 - 500) / 180 = 83  → set 70
#
# With parallel test-case execution, a single submission with 8 test cases
# will try to spawn 8 JVMs.  Gate 2 queues them so total live processes
# never exceed max-processes, regardless of how many users are active.
execution.max-concurrent=8
execution.max-processes=12

# Graceful shutdown: wait up to 30s for in-flight requests to complete
# before the JVM exits. Prevents dropped requests during rolling deploys.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

