<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DevLearn — Roadmaps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── BASE ─────────────────────────────────────────────────────────────────── */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;--border:#252930;--border2:#2e333d;
            --text:#e2e8f0;--text2:#8892a4;--text3:#505a6b;
            --accent:#4ade80;--accent2:#22c55e;--adim:rgba(74,222,128,.1);
            --red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;
            --r:8px;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
        }
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;overflow:hidden}
        body{display:flex;flex-direction:column}

        /* ── TOP NAV ──────────────────────────────────────────────────────────────── */
        .top-nav{
            display:flex;align-items:center;gap:16px;
            padding:12px 24px;background:var(--bg2);
            border-bottom:1px solid var(--border);flex-shrink:0;
        }
        .nav-logo{font-size:16px;font-weight:800;letter-spacing:-.5px}
        .nav-logo span{color:var(--accent)}
        .nav-link{font-size:12px;color:var(--text2);text-decoration:none;padding:4px 10px;
            border:1px solid var(--border2);border-radius:5px;transition:.15s}
        .nav-link:hover{color:var(--text)}
        .nav-spacer{flex:1}
        .nav-actions{display:flex;gap:8px}

        /* ── MAIN SHELL ───────────────────────────────────────────────────────────── */
        .shell{display:flex;flex:1;overflow:hidden}

        /* ── LEFT PANEL ───────────────────────────────────────────────────────────── */
        .left-panel{
            width:300px;min-width:300px;background:var(--bg2);
            border-right:1px solid var(--border);
            display:flex;flex-direction:column;overflow:hidden;
        }
        .left-header{
            padding:16px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
        }
        .left-header h2{font-size:15px;font-weight:700}
        .btn-new-rm{
            padding:6px 14px;background:var(--accent);color:#0a1208;
            border:none;border-radius:6px;font-family:var(--sans);font-size:12px;
            font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;
        }
        .btn-new-rm:hover{background:var(--accent2)}

        .roadmap-list{flex:1;overflow-y:auto;padding:8px}
        .roadmap-list::-webkit-scrollbar{width:4px}
        .roadmap-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

        .rm-card{
            border:1px solid var(--border);border-radius:var(--r);
            padding:14px;margin-bottom:8px;cursor:pointer;transition:.15s;
            border-left-width:3px;
        }
        .rm-card:hover{background:var(--bg3)}
        .rm-card.active{background:var(--bg3);border-color:var(--accent)}
        .rm-card-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
        .rm-icon{font-size:20px;line-height:1}
        .rm-name{font-size:13px;font-weight:700;flex:1}
        .rm-level{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
            background:rgba(255,255,255,.06);color:var(--text3)}
        .rm-meta{display:flex;gap:12px;font-size:11px;color:var(--text3);margin-bottom:8px}
        .rm-progress-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
        .rm-progress-fill{height:100%;border-radius:2px;transition:width .4s}
        .rm-progress-label{font-size:10px;color:var(--text3);margin-top:4px;text-align:right}

        /* ── RIGHT PANEL: ROADMAP VIEW ────────────────────────────────────────────── */
        .right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}

        .rm-top-bar{
            padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:16px;flex-shrink:0;
        }
        .rm-top-title{font-size:20px;font-weight:800;flex:1}
        .rm-top-desc{font-size:13px;color:var(--text2);max-width:500px}
        .rm-top-stats{display:flex;gap:16px;font-size:12px}
        .rm-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
        .rm-stat-num{font-size:18px;font-weight:800;color:var(--accent)}
        .rm-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

        .rm-actions{display:flex;gap:8px}
        .btn-edit-rm{padding:6px 14px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:6px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
        .btn-edit-rm:hover{color:var(--text)}
        .btn-del-rm{padding:6px 12px;background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2);border-radius:6px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
        .btn-del-rm:hover{background:rgba(248,113,113,.15)}

        /* ── ROADMAP PATH ────────────────────────────────────────────────────────── */
        .rm-path-container{flex:1;overflow-y:auto;padding:32px 48px}
        .rm-path-container::-webkit-scrollbar{width:5px}
        .rm-path-container::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

        .empty-rm{text-align:center;padding:80px;color:var(--text3)}
        .empty-rm h3{font-size:22px;font-weight:800;margin-bottom:8px}

        .path-node-wrap{display:flex;align-items:flex-start;gap:0;margin-bottom:0;position:relative}

        /* Connector line between nodes */
        .path-node-wrap:not(:last-child) .path-connector{
            position:absolute;left:35px;top:72px;
            width:2px;height:calc(100% - 40px);
            background:linear-gradient(to bottom,var(--border2),var(--border));
            z-index:0;
        }
        .path-node-wrap.completed:not(:last-child) .path-connector{
            background:linear-gradient(to bottom,var(--accent),var(--accent2));
            opacity:.4;
        }

        .path-number{
            width:72px;height:72px;flex-shrink:0;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            position:relative;z-index:1;padding-bottom:8px;
        }
        .path-circle{
            width:44px;height:44px;border-radius:50%;
            border:2px solid var(--border2);background:var(--bg2);
            display:flex;align-items:center;justify-content:center;
            font-size:14px;font-weight:800;color:var(--text3);
            transition:.2s;cursor:pointer;
        }
        .path-node-wrap.completed .path-circle{
            background:var(--adim);border-color:var(--accent);color:var(--accent);
        }
        .path-node-wrap.active-node .path-circle{
            background:rgba(96,165,250,.12);border-color:var(--blue);color:var(--blue);
            box-shadow:0 0 16px rgba(96,165,250,.2);
        }
        .path-check{
            width:18px;height:18px;border-radius:50%;
            background:var(--accent);color:#0a1208;
            font-size:10px;font-weight:700;
            display:flex;align-items:center;justify-content:center;
            margin-top:4px;opacity:0;transition:.2s;
        }
        .path-node-wrap.completed .path-check{opacity:1}

        .path-card{
            flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
            padding:16px 18px;margin-bottom:20px;margin-left:8px;
            transition:.15s;cursor:pointer;position:relative;overflow:hidden;
        }
        .path-card:hover{border-color:var(--border2);background:var(--bg3)}
        .path-node-wrap.completed .path-card{border-color:rgba(74,222,128,.2)}
        .path-node-wrap.active-node .path-card{border-color:var(--blue);box-shadow:0 0 20px rgba(96,165,250,.08)}

        .path-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .path-card-title{font-size:15px;font-weight:700;flex:1}
        .path-card-cat{
            font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
            padding:2px 8px;border-radius:4px;
        }
        .cat-dsa  {background:rgba(96,165,250,.15);color:var(--blue)}
        .cat-java {background:rgba(251,191,36,.12);color:var(--yellow)}
        .cat-adv  {background:rgba(167,139,250,.12);color:var(--purple)}
        .cat-mysql{background:rgba(251,146,60,.12);color:var(--orange)}
        .cat-aws  {background:rgba(248,113,113,.12);color:var(--red)}

        .path-card-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
        .path-card-footer{display:flex;align-items:center;gap:10px}
        .path-complexity{font-size:11px;font-family:var(--mono);color:var(--accent)}
        .path-card-actions{display:flex;gap:6px;margin-left:auto}

        .btn-start{
            padding:5px 14px;background:var(--accent);color:#0a1208;
            border:none;border-radius:5px;font-family:var(--sans);font-size:11px;
            font-weight:700;cursor:pointer;transition:.15s;
        }
        .btn-start:hover{background:var(--accent2)}
        .btn-done{
            padding:5px 12px;background:var(--adim);color:var(--accent);
            border:1px solid rgba(74,222,128,.3);border-radius:5px;font-family:var(--sans);
            font-size:11px;font-weight:700;cursor:pointer;transition:.15s;
        }
        .btn-done:hover{background:rgba(74,222,128,.18)}
        .btn-undone{
            padding:5px 12px;background:transparent;color:var(--text3);
            border:1px solid var(--border2);border-radius:5px;font-family:var(--sans);
            font-size:11px;font-weight:600;cursor:pointer;transition:.15s;
        }
        .btn-undone:hover{color:var(--text)}
        .path-note{
            margin-top:8px;padding:8px 12px;background:var(--bg3);border-radius:5px;
            font-size:11px;color:var(--text2);border-left:2px solid var(--yellow);
        }

        /* ── MODAL ────────────────────────────────────────────────────────────────── */
        .modal-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,.7);
            display:flex;align-items:center;justify-content:center;z-index:100;
        }
        .modal-overlay.hidden{display:none}
        .modal{
            background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
            width:560px;max-width:94vw;max-height:88vh;overflow-y:auto;padding:28px;
        }
        .modal-title{font-size:18px;font-weight:800;margin-bottom:20px}
        .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
        .field label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
        .field input,.field textarea,.field select{
            background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
            padding:8px 12px;color:var(--text);font-family:var(--sans);font-size:13px;
            outline:none;width:100%;transition:.15s;
        }
        .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
        .field textarea{resize:vertical;min-height:70px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

        .topic-picker{
            max-height:240px;overflow-y:auto;border:1px solid var(--border2);
            border-radius:6px;background:var(--bg3);padding:6px;
        }
        .topic-picker::-webkit-scrollbar{width:4px}
        .topic-picker::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
        .topic-pick-item{
            display:flex;align-items:center;gap:8px;padding:7px 10px;
            border-radius:5px;cursor:pointer;transition:.15s;font-size:13px;
        }
        .topic-pick-item:hover{background:var(--border)}
        .topic-pick-item.selected{background:var(--adim);color:var(--accent)}
        .topic-pick-item input[type=checkbox]{accent-color:var(--accent)}

        .modal-actions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
        .btn-modal-save{padding:9px 22px;background:var(--accent);color:#0a1208;border:none;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
        .btn-modal-save:hover{background:var(--accent2)}
        .btn-modal-cancel{padding:9px 18px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
        .btn-modal-cancel:hover{color:var(--text)}

        /* ── TOAST ────────────────────────────────────────────────────────────────── */
        #toast{
            position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;
            font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);
            transition:opacity .3s,transform .3s;pointer-events:none;z-index:200;
        }
        #toast.show{opacity:1;transform:translateY(0)}
        #toast.success{background:var(--adim);color:var(--accent);border:1px solid rgba(74,222,128,.3)}
        #toast.error{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}
        .muted{color:var(--text3);font-size:13px}
    </style>
</head>
<body>

<!-- TOP NAV -->
<div class="top-nav">
    <span class="nav-logo">⟨dev<span>learn</span>⟩</span>
    <a href="/" class="nav-link">📚 Learn</a>
    <a href="/admin.html" class="nav-link">⚙ Admin</a>
    <div class="nav-spacer"></div>
</div>

<div class="shell">

    <!-- LEFT: ROADMAP LIST -->
    <div class="left-panel">
        <div class="left-header">
            <h2>🗺 Roadmaps</h2>
            <button class="btn-new-rm" onclick="openCreateModal()">+ New</button>
        </div>
        <div class="roadmap-list" id="roadmapList">
            <p class="muted" style="padding:16px">Loading…</p>
        </div>
    </div>

    <!-- RIGHT: ROADMAP PATH -->
    <div class="right-panel" id="rightPanel">
        <div style="flex:1;display:flex;align-items:center;justify-content:center">
            <div class="empty-rm">
                <h3>Select a Roadmap</h3>
                <p>Choose a roadmap from the left, or create a new one<br>to build your personal learning path.</p>
            </div>
        </div>
    </div>
</div>

<!-- CREATE/EDIT ROADMAP MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
        <div class="modal-title" id="modalTitle">Create Roadmap</div>

        <div class="form-row">
            <div class="field">
                <label>Name *</label>
                <input id="mName" placeholder="e.g. DSA Interview Prep"/>
            </div>
            <div class="field">
                <label>Icon (emoji)</label>
                <input id="mIcon" placeholder="🗺" maxlength="4"/>
            </div>
        </div>
        <div class="field">
            <label>Description</label>
            <textarea id="mDesc" placeholder="What will you learn in this roadmap?"></textarea>
        </div>
        <div class="form-row">
            <div class="field">
                <label>Level</label>
                <select id="mLevel">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                    <option value="Beginner → Advanced">Beginner → Advanced</option>
                </select>
            </div>
            <div class="field">
                <label>Accent Color</label>
                <input type="color" id="mColor" value="#4ade80" style="height:38px;padding:4px"/>
            </div>
        </div>
        <div class="field">
            <label>Estimated Hours</label>
            <input type="number" id="mHours" placeholder="40" min="1"/>
        </div>

        <div class="field">
            <label>Select Topics (in order)</label>
            <div class="topic-picker" id="topicPicker">
                <p class="muted" style="padding:8px">Loading topics…</p>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-modal-save" id="modalSaveBtn" onclick="saveRoadmap()">✚ Create</button>
            <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
    // ── State ──────────────────────────────────────────────────────────────────
    let roadmaps    = [];
    let allTopics   = [];
    let activeRoadmap = null;
    let editingId   = null;
    // Progress stored in localStorage: { roadmapId_topicId: true }
    const DONE_KEY  = 'devlearn_done';

    function getDoneSet() {
        try { return JSON.parse(localStorage.getItem(DONE_KEY) || '{}'); } catch{ return {}; }
    }
    function toggleDone(roadmapId, topicId) {
        const s = getDoneSet();
        const k = `${roadmapId}_${topicId}`;
        if (s[k]) delete s[k]; else s[k] = true;
        localStorage.setItem(DONE_KEY, JSON.stringify(s));
    }
    function isDone(roadmapId, topicId) {
        return !!getDoneSet()[`${roadmapId}_${topicId}`];
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        await Promise.all([loadRoadmaps(), loadTopics()]);
    });

    async function loadRoadmaps() {
        try {
            const res = await fetch('/api/roadmaps');
            roadmaps = await res.json();
            renderRoadmapList();
        } catch(e) {
            document.getElementById('roadmapList').innerHTML = '<p class="muted" style="padding:16px">⚠ Server unreachable</p>';
        }
    }

    async function loadTopics() {
        try {
            const res = await fetch('/api/topics');
            allTopics = await res.json();
        } catch {}
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function renderRoadmapList() {
        const el = document.getElementById('roadmapList');
        if (!roadmaps.length) {
            el.innerHTML = '<p class="muted" style="padding:16px">No roadmaps yet. Create one!</p>';
            return;
        }
        el.innerHTML = roadmaps.map(r => {
            const done = r.topics?.filter(t => isDone(r.id, t.topicId)).length || 0;
            const total = r.totalTopics || 0;
            const pct = total ? Math.round(done/total*100) : 0;
            return `
      <div class="rm-card ${activeRoadmap?.id===r.id?'active':''}"
           style="border-left-color:${r.color||'#4ade80'}"
           onclick="selectRoadmap(${r.id})">
        <div class="rm-card-header">
          <span class="rm-icon">${r.icon||'📁'}</span>
          <span class="rm-name">${esc(r.name)}</span>
          <span class="rm-level">${r.level||''}</span>
        </div>
        <div class="rm-meta">
          <span>📚 ${total} topics</span>
          ${r.estimatedHours?`<span>⏱ ${r.estimatedHours}h`:''}
          <span>✅ ${done}/${total}</span>
        </div>
        <div class="rm-progress-bar">
          <div class="rm-progress-fill" style="width:${pct}%;background:${r.color||'#4ade80'}"></div>
        </div>
        <div class="rm-progress-label">${pct}% complete</div>
      </div>`;
        }).join('');
    }

    async function selectRoadmap(id) {
        const res = await fetch(`/api/roadmaps/${id}`);
        activeRoadmap = await res.json();
        renderRoadmapList();
        renderRoadmapPath();
    }

    // ── Path view ─────────────────────────────────────────────────────────────
    function renderRoadmapPath() {
        const r = activeRoadmap;
        if (!r) return;

        const done = r.topics?.filter(t => isDone(r.id, t.topicId)).length || 0;
        const total = r.totalTopics || 0;
        const pct = total ? Math.round(done/total*100) : 0;
        const firstNotDone = r.topics?.find(t => !isDone(r.id, t.topicId));

        document.getElementById('rightPanel').innerHTML = `
    <!-- Top bar -->
    <div class="rm-top-bar">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:24px">${r.icon||'📁'}</span>
          <span class="rm-top-title">${esc(r.name)}</span>
        </div>
        <div class="rm-top-desc">${esc(r.description||'')}</div>
      </div>
      <div class="rm-top-stats">
        <div class="rm-stat"><span class="rm-stat-num">${total}</span><span class="rm-stat-label">Topics</span></div>
        <div class="rm-stat"><span class="rm-stat-num" style="color:var(--accent)">${done}</span><span class="rm-stat-label">Done</span></div>
        <div class="rm-stat"><span class="rm-stat-num">${pct}%</span><span class="rm-stat-label">Progress</span></div>
        ${r.estimatedHours?`<div class="rm-stat"><span class="rm-stat-num">${r.estimatedHours}</span><span class="rm-stat-label">Hours</span></div>`:''}
      </div>
      <div class="rm-actions">
        <button class="btn-edit-rm" onclick="openEditModal()">✏ Edit</button>
        <button class="btn-edit-rm" onclick="openAddTopicsModal()">+ Topics</button>
        <button class="btn-del-rm" onclick="deleteRoadmap(${r.id})">🗑</button>
      </div>
    </div>

    <!-- Overall progress bar -->
    <div style="padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border)">
      <div style="height:3px;background:var(--bg3);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${r.color||'#4ade80'};transition:width .5s;border-radius:2px"></div>
      </div>
    </div>

    <!-- Path nodes -->
    <div class="rm-path-container" id="pathContainer">
      ${!r.topics?.length
            ? `<div class="empty-rm"><h3>No Topics Yet</h3><p>Click <strong>+ Topics</strong> to add learning steps.</p></div>`
            : r.topics.map((t, i) => renderNode(t, i, r, firstNotDone)).join('')}
    </div>
  `;
    }

    function renderNode(t, i, r, firstNotDone) {
        const done     = isDone(r.id, t.topicId);
        const isCurrent = !done && firstNotDone?.topicId === t.topicId;
        const catKey   = t.topicCategory?.toLowerCase().replace('_java','_java');
        const catClass = catKey === 'dsa' ? 'cat-dsa' : catKey === 'java' ? 'cat-java' :
            catKey === 'advanced_java' ? 'cat-adv' : catKey === 'mysql' ? 'cat-mysql' : 'cat-aws';
        const catLabel = t.topicCategory === 'ADVANCED_JAVA' ? 'Adv Java' : t.topicCategory;

        return `
    <div class="path-node-wrap ${done?'completed':''} ${isCurrent?'active-node':''}">
      <div class="path-connector"></div>
      <div class="path-number">
        <div class="path-circle">${done?'✓':i+1}</div>
        <div class="path-check">✓</div>
      </div>
      <div class="path-card" onclick="openTopic(${t.topicId})">
        <div class="path-card-header">
          <span class="path-card-title">${esc(t.topicTitle)}</span>
          <span class="path-card-cat ${catClass}">${catLabel}</span>
          ${isCurrent?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(96,165,250,.12);color:var(--blue)">▶ Current</span>`:''}
        </div>
        ${t.topicDescription?`<div class="path-card-desc">${esc(t.topicDescription)}</div>`:''}
        <div class="path-card-footer">
          ${t.timeComplexity?`<span class="path-complexity">⏱ ${esc(t.timeComplexity)}</span>`:''}
          <div class="path-card-actions" onclick="event.stopPropagation()">
            ${done
            ? `<button class="btn-undone" onclick="toggleTopicDone(${r.id},${t.topicId})">↩ Undo</button>`
            : `<button class="btn-start" onclick="openTopic(${t.topicId})">▶ Start</button>
                 <button class="btn-done" onclick="toggleTopicDone(${r.id},${t.topicId})">✓ Done</button>`
        }
            <button class="btn-undone" onclick="removeFromRoadmap(${r.id},${t.topicId})" title="Remove from roadmap" style="padding:5px 8px">✕</button>
          </div>
        </div>
        ${t.note?`<div class="path-note">💡 ${esc(t.note)}</div>`:''}
      </div>
    </div>`;
    }

    function toggleTopicDone(roadmapId, topicId) {
        toggleDone(roadmapId, topicId);
        renderRoadmapList();
        renderRoadmapPath();
    }

    function openTopic(topicId) {
        window.open(`/?topic=${topicId}`, '_blank');
    }

    async function removeFromRoadmap(roadmapId, topicId) {
        if (!confirm('Remove this topic from the roadmap?')) return;
        try {
            const res = await fetch(`/api/roadmaps/${roadmapId}/topics/${topicId}`, { method: 'DELETE' });
            activeRoadmap = await res.json();
            renderRoadmapPath();
            renderRoadmapList();
            toast('Topic removed', 'success');
        } catch(e) { toast('Error: ' + e.message, 'error'); }
    }

    async function deleteRoadmap(id) {
        if (!confirm('Delete this entire roadmap?')) return;
        try {
            await fetch(`/api/roadmaps/${id}`, { method: 'DELETE' });
            roadmaps = roadmaps.filter(r => r.id !== id);
            activeRoadmap = null;
            renderRoadmapList();
            document.getElementById('rightPanel').innerHTML =
                '<div style="flex:1;display:flex;align-items:center;justify-content:center"><div class="empty-rm"><h3>Roadmap deleted</h3></div></div>';
            toast('Roadmap deleted', 'success');
        } catch(e) { toast('Error', 'error'); }
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    let selectedTopicIds = [];

    function openCreateModal() {
        editingId = null;
        selectedTopicIds = [];
        document.getElementById('modalTitle').textContent = 'Create Roadmap';
        document.getElementById('modalSaveBtn').textContent = '✚ Create';
        clearForm();
        renderTopicPicker();
        document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function openEditModal() {
        if (!activeRoadmap) return;
        editingId = activeRoadmap.id;
        selectedTopicIds = activeRoadmap.topics?.map(t => t.topicId) || [];
        document.getElementById('modalTitle').textContent = 'Edit Roadmap';
        document.getElementById('modalSaveBtn').textContent = '💾 Save';
        document.getElementById('mName').value = activeRoadmap.name || '';
        document.getElementById('mDesc').value = activeRoadmap.description || '';
        document.getElementById('mIcon').value = activeRoadmap.icon || '';
        document.getElementById('mColor').value = activeRoadmap.color || '#4ade80';
        document.getElementById('mLevel').value = activeRoadmap.level || 'Beginner';
        document.getElementById('mHours').value = activeRoadmap.estimatedHours || '';
        renderTopicPicker();
        document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function openAddTopicsModal() {
        openEditModal();
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.add('hidden');
    }

    function clearForm() {
        ['mName','mDesc','mIcon','mHours'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('mColor').value = '#4ade80';
        document.getElementById('mLevel').value = 'Beginner';
    }

    function renderTopicPicker() {
        const el = document.getElementById('topicPicker');
        if (!allTopics.length) { el.innerHTML = '<p class="muted" style="padding:8px">No topics available. Add topics in Admin first.</p>'; return; }

        // Group by category
        const groups = {};
        allTopics.forEach(t => {
            const cat = t.category || 'OTHER';
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(t);
        });

        el.innerHTML = Object.entries(groups).map(([cat, topics]) => `
    <div style="margin-bottom:4px">
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px 4px">${cat}</div>
      ${topics.map(t => `
        <div class="topic-pick-item ${selectedTopicIds.includes(t.id)?'selected':''}"
             onclick="toggleTopicPick(${t.id},this)">
          <input type="checkbox" ${selectedTopicIds.includes(t.id)?'checked':''} onclick="event.stopPropagation();toggleTopicPick(${t.id},this.parentElement)"/>
          <span>${esc(t.title)}</span>
        </div>`).join('')}
    </div>`).join('');
    }

    function toggleTopicPick(topicId, el) {
        const idx = selectedTopicIds.indexOf(topicId);
        if (idx >= 0) { selectedTopicIds.splice(idx,1); el.classList.remove('selected'); el.querySelector('input').checked=false; }
        else { selectedTopicIds.push(topicId); el.classList.add('selected'); el.querySelector('input').checked=true; }
    }

    async function saveRoadmap() {
        const name = document.getElementById('mName').value.trim();
        if (!name) { toast('Name is required', 'error'); return; }

        const payload = {
            name,
            description: document.getElementById('mDesc').value.trim(),
            icon:        document.getElementById('mIcon').value.trim() || '📁',
            color:       document.getElementById('mColor').value,
            level:       document.getElementById('mLevel').value,
            estimatedHours: parseInt(document.getElementById('mHours').value) || null,
            topicIds:    selectedTopicIds,
        };

        try {
            let res;
            if (editingId) {
                // Update metadata
                res = await fetch(`/api/roadmaps/${editingId}`, {
                    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
                });
                // Reorder topics
                if (selectedTopicIds.length) {
                    await fetch(`/api/roadmaps/${editingId}/reorder`, {
                        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(selectedTopicIds)
                    });
                    // Add any newly selected topics
                    const existing = activeRoadmap.topics?.map(t => t.topicId) || [];
                    for (let i = 0; i < selectedTopicIds.length; i++) {
                        if (!existing.includes(selectedTopicIds[i])) {
                            await fetch(`/api/roadmaps/${editingId}/topics/${selectedTopicIds[i]}`, {
                                method: 'POST', headers: {'Content-Type':'application/json'},
                                body: JSON.stringify({ orderIndex: i+1 })
                            });
                        }
                    }
                }
                activeRoadmap = await (await fetch(`/api/roadmaps/${editingId}`)).json();
                const idx = roadmaps.findIndex(r => r.id === editingId);
                if (idx >= 0) roadmaps[idx] = activeRoadmap;
                toast('Roadmap updated ✓', 'success');
            } else {
                res = await fetch('/api/roadmaps', {
                    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
                });
                const created = await res.json();
                roadmaps.push(created);
                activeRoadmap = created;
                toast('Roadmap created ✓', 'success');
            }
            closeModal();
            renderRoadmapList();
            renderRoadmapPath();
        } catch(e) { toast('Error: ' + e.message, 'error'); }
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function toast(msg, type='success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `show ${type}`;
        clearTimeout(el._t);
        el._t = setTimeout(() => el.className = type, 2800);
    }
    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
