<html lang="en">
<head>
    <script>
    (function(){
      var p=new URLSearchParams(window.location.search);
      if(p.get('token'))return;
      var t=localStorage.getItem('devlearn_token');
      var u=null;try{u=JSON.parse(localStorage.getItem('devlearn_user'));}catch(e){}
      if(!t||!u)window.location.replace('/login.html?from='+encodeURIComponent(window.location.pathname));
    })();
  </script>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>DevLearn — Problem Set</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css"/>
    <style>
    /* ── Page-specific overrides ── */
    body { overflow: auto; display: block; }

    /* ── Top nav ── */
    .ps-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px; height: 50px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .ps-nav-logo { font-size: 15px; font-weight: 900; letter-spacing: -.5px; text-decoration: none; color: var(--text); }
    .ps-nav-logo span { color: var(--accent); }
    .ps-nav-sep  { color: var(--border2); font-size: 18px; }
    .ps-nav-title{ font-size: 13px; font-weight: 700; color: var(--text2); }
    .ps-nav-space{ flex: 1; }
    .ps-nav-link { font-size: 12px; font-weight: 700; color: var(--text3); text-decoration: none;
                   padding: 5px 10px; border: 1px solid var(--border2); border-radius: 5px; transition: .15s; }
    .ps-nav-link:hover { color: var(--text); }

    /* ── Layout ── */
    .ps-container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    /* ── Stats bar ── */
    .ps-stats {
      display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .ps-stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 18px; text-align: center; min-width: 90px;
    }
    .ps-stat-num  { font-size: 22px; font-weight: 900; font-family: var(--font-code); }
    .ps-stat-lbl  { font-size: 10px; font-weight: 700; text-transform: uppercase;
                    letter-spacing: .5px; color: var(--text3); margin-top: 2px; }
    .stat-all    { color: var(--text); }
    .stat-easy   { color: var(--accent); }
    .stat-med    { color: var(--yellow); }
    .stat-hard   { color: var(--red); }

    /* ── Filters row ── */
    .ps-filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
    }
    .ps-search {
      flex: 1; min-width: 200px; max-width: 320px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 12px; color: var(--text); font-family: var(--font-ui); font-size: 13px;
      outline: none;
    }
    .ps-search:focus { border-color: var(--accent); }
    .ps-search::placeholder { color: var(--text3); }
    .ps-select {
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px;
      padding: 7px 10px; color: var(--text2); font-family: var(--font-ui); font-size: 12px;
      font-weight: 700; cursor: pointer; outline: none;
    }
    .ps-select:focus { border-color: var(--accent); }
    .ps-filter-tag {
      padding: 5px 12px; border: 1px solid var(--border2); border-radius: 16px;
      font-size: 11px; font-weight: 700; color: var(--text3); cursor: pointer;
      background: transparent; transition: .15s;
    }
    .ps-filter-tag:hover { color: var(--text); }
    .ps-filter-tag.active { background: var(--adim); border-color: var(--accent); color: var(--accent); }
    .ps-filter-tag.easy.active   { background: rgba(0,184,163,.1); border-color: var(--accent); color: var(--accent); }
    .ps-filter-tag.medium.active { background: rgba(255,184,0,.1); border-color: var(--yellow); color: var(--yellow); }
    .ps-filter-tag.hard.active   { background: rgba(239,71,67,.1); border-color: var(--red); color: var(--red); }
    .ps-count { font-size: 12px; color: var(--text3); margin-left: auto; font-weight: 700; }

    /* ── Table ── */
    .ps-table { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .ps-table-head {
      display: grid;
      grid-template-columns: 52px 1fr 110px 120px 110px;
      gap: 0; background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .ps-th {
      padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .5px; cursor: pointer;
      user-select: none; transition: .15s;
    }
    .ps-th:hover { color: var(--text); }
    .ps-th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
    .ps-th.sort-desc::after { content: ' ↓'; color: var(--accent); }

    .ps-row {
      display: grid;
      grid-template-columns: 52px 1fr 110px 120px 110px;
      gap: 0; border-bottom: 1px solid var(--border);
      transition: background .1s; cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .ps-row:last-child { border-bottom: none; }
    .ps-row:hover { background: var(--bg3); }
    .ps-row:hover .ps-row-title { color: var(--accent); }

    .ps-row-num   { padding: 13px 14px; font-family: var(--font-code); font-size: 12px;
                    color: var(--text3); display: flex; align-items: center; }
    .ps-row-title { padding: 13px 14px; font-size: 13px; font-weight: 600;
                    display: flex; align-items: center; gap: 8px; transition: .15s; }
    .ps-row-topic { padding: 13px 14px; font-size: 11px; color: var(--text3);
                    display: flex; align-items: center; font-weight: 600; }
    .ps-row-pattern { padding: 13px 14px; display: flex; align-items: center; }
    .ps-row-diff  { padding: 13px 14px; display: flex; align-items: center; }

    .diff-badge { font-size: 10px; font-weight: 700; padding: 2px 8px;
                  border-radius: 10px; text-transform: uppercase; letter-spacing: .3px; }
    .diff-easy   { background: rgba(0,184,163,.12);  color: var(--accent); }
    .diff-medium { background: rgba(255,184,0,.12);  color: var(--yellow); }
    .diff-hard   { background: rgba(239,71,67,.12);  color: var(--red); }

    .pattern-pill { font-size: 9px; font-weight: 700; padding: 2px 7px;
                    border-radius: 10px; border: 1px solid var(--border2);
                    color: var(--text3); white-space: nowrap; }

    .cat-pill { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
    .cat-dsa  { background: rgba(91,138,245,.12);  color: var(--blue); }
    .cat-java { background: rgba(255,184,0,.1);    color: var(--yellow); }
    .cat-adv  { background: rgba(167,139,250,.12); color: var(--purple); }

    /* ── Interview section badge ── */
    .hot-badge { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 3px;
                 background: rgba(239,71,67,.12); color: var(--red); border: 1px solid rgba(239,71,67,.2); }

    /* ── Empty state ── */
    .ps-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
    .ps-empty-icon { font-size: 36px; margin-bottom: 12px; }
    .ps-empty h3 { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }

    /* ── Section headers ── */
    .ps-section-header {
      display: flex; align-items: center; gap: 10px; padding: 16px 0 8px;
    }
    .ps-section-title { font-size: 14px; font-weight: 800; }
    .ps-section-badge { font-size: 10px; font-weight: 700; padding: 2px 8px;
                        border-radius: 10px; background: var(--adim); color: var(--accent); }

    /* ── Loading ── */
    .ps-loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

    /* ── Progress ring ── */
    .ps-progress { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .ps-prog-ring { width: 36px; height: 36px; }
    .ps-prog-text { font-size: 11px; font-weight: 700; color: var(--text2); text-align: right; }
    .ps-prog-num  { font-size: 14px; font-weight: 900; color: var(--accent); }

    /* ── Sticky section for Top 50 ── */
    .ps-sticky-section {
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
      padding: 4px 8px; margin-bottom: 4px;
      font-size: 11px; font-weight: 800; color: var(--text3);
      text-transform: uppercase; letter-spacing: .5px;
    }

    @media (max-width: 700px) {
      .ps-table-head,
      .ps-row { grid-template-columns: 40px 1fr 80px; }
      .ps-row-topic, .ps-row-pattern { display: none; }
      .ps-th:nth-child(3), .ps-th:nth-child(4) { display: none; }
    }
  </style>
</head>

<script>
/* ════════════════════════════════════════════════════════════
   problems.js — Problem Set Page Controller
════════════════════════════════════════════════════════════ */

// ── 50 Most Asked DSA Interview Questions (with patterns for filtering) ──
const TOP_50_TITLES = [
  // Arrays
  "Two Sum","Best Time to Buy and Sell Stock","Contains Duplicate","Maximum Subarray Sum (Kadane's)",
  "Move Zeros to End","Reverse Array","Merge Two Sorted Arrays","Find Maximum Element",
  // Binary Search
  "Classic Binary Search","Count Occurrences in Sorted Array",
  // Two Pointer
  "Two Sum II (Sorted Array)","Valid Palindrome","Container With Most Water",
  // Sliding Window
  "Max Sum Subarray of Size K","Longest Substring Without Repeating Characters",
  // LinkedList
  "Reverse Linked List",
  // Stack / Queue
  "Valid Parentheses","BFS Shortest Path",
  // Recursion
  "Fibonacci Number","Factorial",
  // HashMap
  "Word Frequency","Valid Anagram","First Non-Repeating Character",
  // Sorting
  "Sort an Array","Merge Two Sorted Arrays",
  // Misc frequently asked
  "Find Maximum Element","Array Sum","Second Largest","Count Even and Odd",
  "Maximum Subarray Sum (Kadane's)","Move Zeros to End","Best Time to Buy and Sell Stock",
  "Contains Duplicate","Two Sum","Reverse Array","Valid Palindrome",
  "Max Sum Subarray of Size K","Classic Binary Search","Fibonacci Number",
  "Valid Parentheses","Word Frequency","Valid Anagram","First Non-Repeating Character",
  "BFS Shortest Path","Factorial","Two Sum II (Sorted Array)",
  "Sort an Array","Count Occurrences in Sorted Array",
  "Reverse Linked List","Longest Substring Without Repeating Characters"
];
// Deduplicated
const TOP_50_SET = [...new Set(TOP_50_TITLES)];

// ── State ──
let allProblems = [];
let filteredProblems = [];
let diffFilter    = '';
let solvedSet     = new Set(JSON.parse(localStorage.getItem('devlearn_solved') || '[]'));
let sortCol       = 'difficulty';
let sortDir       = 'asc';

// ── Init ──
(function init() {
  const user = JSON.parse(localStorage.getItem('devlearn_user') || 'null');
  if (!user) { window.location.replace('/login.html'); return; }
  document.body.style.visibility = 'visible';
  const nameEl = document.getElementById('psNavUser');
  if (nameEl) nameEl.textContent = user.name || user.email;
  loadProblems();
})();

async function loadProblems() {
  try {
    // Use the new /api/problems endpoint
    const res  = await fetch('/api/problems', { headers: Auth.headers() });
    allProblems = res.ok ? await res.json() : [];

    // Fallback: if new endpoint not deployed yet, gather from topics
    if (!allProblems.length) {
      allProblems = await fallbackLoadFromTopics();
    }

    buildStats();
    applyFilters();
    bindEvents();
  } catch (e) {
    document.getElementById('allProblemsTable').innerHTML =
      '<div class="ps-loading">⚠ Could not load problems. Make sure the server is running.</div>';
  }
}

// Fallback: gather all problems from topics if new endpoint not deployed
async function fallbackLoadFromTopics() {
  try {
    const topics = await API.getTopics(null);
    const all = [];
    await Promise.all(topics.map(async t => {
      try {
        const probs = await API.getProblems(t.id);
        probs.forEach(p => {
          all.push({
            id: p.id, title: p.title, difficulty: p.difficulty,
            pattern: p.pattern, displayOrder: p.displayOrder,
            topicId: t.id, topicTitle: t.title, topicCategory: t.category
          });
        });
      } catch {}
    }));
    return all.sort((a,b) => diffOrder(a.difficulty) - diffOrder(b.difficulty));
  } catch { return []; }
}

function diffOrder(d) {
  return d === 'EASY' ? 0 : d === 'MEDIUM' ? 1 : 2;
}

// ── Stats ──
function buildStats() {
  const total  = allProblems.length;
  const easy   = allProblems.filter(p => p.difficulty === 'EASY').length;
  const medium = allProblems.filter(p => p.difficulty === 'MEDIUM').length;
  const hard   = allProblems.filter(p => p.difficulty === 'HARD').length;
  document.getElementById('statAll').textContent  = total;
  document.getElementById('statEasy').textContent = easy;
  document.getElementById('statMed').textContent  = medium;
  document.getElementById('statHard').textContent = hard;
  document.getElementById('solvedTotal').textContent = total;
  updateSolvedBar();
}

function updateSolvedBar() {
  const total = allProblems.length;
  const solved = allProblems.filter(p => solvedSet.has(p.id)).length;
  document.getElementById('solvedCount').textContent = solved;
  document.getElementById('solvedFill').style.width =
    total ? Math.round(solved / total * 100) + '%' : '0%';
}

// ── Filters ──
function setDiff(btn, diff) {
  document.querySelectorAll('.ps-filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  diffFilter = diff;
  applyFilters();
}

function applyFilters() {
  const search  = document.getElementById('psSearch')?.value.trim().toLowerCase() || '';
  const cat     = document.getElementById('psCatFilter')?.value || '';
  const pattern = document.getElementById('psPatternFilter')?.value || '';

  filteredProblems = allProblems.filter(p => {
    if (diffFilter && p.difficulty !== diffFilter) return false;
    if (cat && p.topicCategory !== cat) return false;
    if (pattern && p.pattern !== pattern) return false;
    if (search && !p.title?.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  filteredProblems.sort((a, b) => {
    let va, vb;
    if (sortCol === 'difficulty') { va = diffOrder(a.difficulty); vb = diffOrder(b.difficulty); }
    else if (sortCol === 'title') { va = a.title || ''; vb = b.title || ''; }
    else { va = a.displayOrder || 999; vb = b.displayOrder || 999; }
    return sortDir === 'asc' ? (va > vb ? 1 : va < vb ? -1 : 0)
                              : (va < vb ? 1 : va > vb ? -1 : 0);
  });

  const countEl = document.getElementById('psCount');
  if (countEl) countEl.textContent = filteredProblems.length + ' problems';

  renderAllProblems();
  renderTop50();
  // Show/hide top50 section based on filters
  const hasFilter = diffFilter || cat || pattern || search;
  document.getElementById('top50Section').style.display = hasFilter ? 'none' : '';
}

// ── Render All Problems table ──
function renderAllProblems() {
  const container = document.getElementById('allProblemsTable');
  const badge     = document.getElementById('allBadge');
  if (badge) badge.textContent = filteredProblems.length + ' problems';

  if (!filteredProblems.length) {
    container.innerHTML = `<div class="ps-empty"><div class="ps-empty-icon">🔍</div><h3>No problems found</h3><p style="font-size:12px;color:var(--text3)">Try adjusting the filters above</p></div>`;
    return;
  }

  container.innerHTML = `
    <div class="ps-table-head">
      <div class="ps-th">#</div>
      <div class="ps-th ${sortCol==='title'?'sort-'+sortDir:''}" onclick="setSort('title')">Title</div>
      <div class="ps-th">Topic</div>
      <div class="ps-th">Pattern</div>
      <div class="ps-th ${sortCol==='difficulty'?'sort-'+sortDir:''}" onclick="setSort('difficulty')">Difficulty</div>
    </div>
    <div id="allProbsBody">${filteredProblems.map((p,i) => rowHTML(p, i+1)).join('')}</div>`;
}

// ── Render Top 50 table ──
function renderTop50() {
  const container = document.getElementById('top50Table');
  const badge     = document.getElementById('top50Badge');

  const top50 = allProblems.filter(p =>
    TOP_50_SET.some(t => p.title?.toLowerCase() === t.toLowerCase())
  );

  if (badge) badge.textContent = top50.length + ' problems';

  if (!top50.length) {
    container.innerHTML = `<div class="ps-loading" style="font-size:12px">Import problems via Admin Panel → these will appear here automatically.</div>`;
    return;
  }

  // Group by pattern
  const groups = {};
  top50.forEach(p => {
    const key = p.pattern || 'OTHER';
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  const patternLabels = {
    BRUTE_FORCE: 'Brute Force', TWO_POINTER: 'Two Pointer',
    SLIDING_WINDOW: 'Sliding Window', HASHMAP: 'HashMap / HashSet',
    BINARY_SEARCH: 'Binary Search', RECURSION: 'Recursion',
    BFS: 'BFS / Queue', DFS: 'DFS', DP: 'Dynamic Programming',
    GREEDY: 'Greedy', BACKTRACKING: 'Backtracking', OTHER: 'Other',
  };

  let html = `<div class="ps-table-head">
    <div class="ps-th">#</div>
    <div class="ps-th">Title</div>
    <div class="ps-th">Topic</div>
    <div class="ps-th">Pattern</div>
    <div class="ps-th">Difficulty</div>
  </div><div id="top50Body">`;

  let num = 1;
  // Preferred order
  ['TWO_POINTER','SLIDING_WINDOW','HASHMAP','BINARY_SEARCH','BRUTE_FORCE','RECURSION','BFS','DP','GREEDY','BACKTRACKING','OTHER']
    .forEach(key => {
      if (!groups[key]) return;
      html += `<div class="ps-sticky-section">${patternLabels[key] || key}</div>`;
      groups[key].sort((a,b) => diffOrder(a.difficulty)-diffOrder(b.difficulty))
        .forEach(p => { html += rowHTML(p, num++, true); });
    });

  html += '</div>';
  container.innerHTML = html;
}

function rowHTML(p, num, isTop50 = false) {
  const solved  = solvedSet.has(p.id);
  const diffCls = (p.difficulty||'').toLowerCase();
  const catCls  = p.topicCategory === 'ADVANCED_JAVA' ? 'cat-adv'
                : p.topicCategory === 'JAVA' ? 'cat-java' : 'cat-dsa';
  const catLbl  = p.topicCategory === 'ADVANCED_JAVA' ? 'Adv' : (p.topicCategory || 'DSA');

  return `<div class="ps-row" onclick="openProblem(${p.id},${p.topicId})">
    <div class="ps-row-num">${solved ? '<span style="color:var(--accent)">✓</span>' : num}</div>
    <div class="ps-row-title">
      ${esc(p.title || '')}
      ${isTop50 ? '<span class="hot-badge">🔥 Top 50</span>' : ''}
    </div>
    <div class="ps-row-topic">
      ${p.topicTitle ? `<span class="cat-pill ${catCls}">${esc(catLbl)}</span>&nbsp;${esc(p.topicTitle)}` : '—'}
    </div>
    <div class="ps-row-pattern">
      ${p.pattern ? `<span class="pattern-pill">${esc(p.pattern.replace(/_/g,' '))}</span>` : '<span style="color:var(--text3);font-size:11px">—</span>'}
    </div>
    <div class="ps-row-diff">
      <span class="diff-badge diff-${diffCls}">${p.difficulty || '—'}</span>
    </div>
  </div>`;
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  applyFilters();
}

// ── Open Problem ──
function openProblem(problemId, topicId) {
  if (!topicId) { console.warn('openProblem: topicId missing for problemId', problemId); return; }
  // Navigate to main learning page — editor.js reads ?openProblem= and opens the PS view directly.
  window.location.href = `/?topic=${topicId}&openProblem=${problemId}`;
}

// Safety function for the overlay Back button (overlay is currently unused — kept as fallback)
function closePSOverlay() {
  const overlay = document.getElementById('psOverlay');
  const frame   = document.getElementById('psFrame');
  if (overlay) overlay.style.display = 'none';
  if (frame)   frame.src = 'about:blank';
}

// ── Events ──
function bindEvents() {
  let searchTimer;
  document.getElementById('psSearch')?.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilters, 250);
  });
  document.getElementById('psCatFilter')?.addEventListener('change', applyFilters);
  document.getElementById('psPatternFilter')?.addEventListener('change', applyFilters);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Expose for mark-solved (called from main page after successful submit) ──
window.addEventListener('message', e => {
  if (e.data?.type === 'devlearn_solved' && e.data.problemId) {
    solvedSet.add(e.data.problemId);
    localStorage.setItem('devlearn_solved', JSON.stringify([...solvedSet]));
    updateSolvedBar();
  }
});
</script>
</body>
</html>
