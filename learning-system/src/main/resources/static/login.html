<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DevLearn — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;
      --border:#252930;--border2:#2e333d;
      --text:#e2e8f0;--text2:#8892a4;--text3:#505a6b;
      --accent:#4ade80;--accent2:#22c55e;--adim:rgba(74,222,128,.1);
      --red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
      --r:10px;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}

    /* ── Layout ── */
    .shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
           background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(74,222,128,.06),transparent)}

    /* ── Card ── */
    .card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);
          border-radius:16px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.4)}

    /* ── Header ── */
    .card-header{padding:28px 28px 0;text-align:center}
    .logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
    .logo span{color:var(--accent)}
    .logo-sub{font-size:12px;color:var(--text3);margin-bottom:20px}

    /* ── Tabs ── */
    .tabs{display:flex;border-bottom:1px solid var(--border);margin:0 28px}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;
         color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;
         transition:.15s;margin-bottom:-1px}
    .tab:hover{color:var(--text2)}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Forms ── */
    .form-panel{padding:24px 28px 28px;display:none}
    .form-panel.active{display:block}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
                  letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
    .field input{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--border2);
                  border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;
                  transition:.15s;outline:none}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--adim)}
    .field input.error{border-color:var(--red)}
    .field input::placeholder{color:var(--text3)}

    /* ── Buttons ── */
    .btn-primary{width:100%;padding:11px;background:var(--accent);color:#0d0f12;
                  border:none;border-radius:8px;font-family:var(--sans);font-size:14px;
                  font-weight:800;cursor:pointer;transition:.15s;letter-spacing:-.2px}
    .btn-primary:hover{background:var(--accent2)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}

    .btn-google{width:100%;padding:11px;background:var(--bg3);color:var(--text);
                border:1px solid var(--border2);border-radius:8px;font-family:var(--sans);
                font-size:14px;font-weight:700;cursor:pointer;transition:.15s;
                display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
    .btn-google:hover{border-color:var(--text2);background:var(--bg2)}
    .btn-google svg{flex-shrink:0}

    /* ── Divider ── */
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:11px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ── Alerts ── */
    .alert{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
    .alert.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red)}
    .alert.success{background:var(--adim);border:1px solid rgba(74,222,128,.25);color:var(--accent)}
    .alert.show{display:block}

    /* ── Footer ── */
    .card-footer{padding:14px 28px 18px;text-align:center;font-size:12px;color:var(--text3);
                  border-top:1px solid var(--border)}
    .card-footer a{color:var(--accent);text-decoration:none}
    .card-footer a:hover{color:var(--accent2)}

    /* ── Password toggle ── */
    .password-wrap{position:relative}
    .password-wrap input{padding-right:40px}
    .pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);
                background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;font-size:16px}
    .pw-toggle:hover{color:var(--text2)}

    /* ── Spinner ── */
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);
              border-top-color:#0d0f12;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Password strength ── */
    .strength-bar{height:3px;border-radius:2px;margin-top:5px;transition:.3s;background:var(--border)}
    .strength-bar[data-strength="weak"]{background:var(--red);width:33%}
    .strength-bar[data-strength="medium"]{background:var(--yellow);width:66%}
    .strength-bar[data-strength="strong"]{background:var(--accent);width:100%}
    .strength-label{font-size:10px;color:var(--text3);margin-top:3px;height:12px}

    /* ── Error token from URL ── */
    .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
             background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
    .url-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);
                border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);
                margin:0 28px 16px;text-align:center;display:none}
    .url-error.show{display:block}
  </style>
</head>
<body>
<div class="shell">
    <div class="card">

        <!-- Header -->
        <div class="card-header">
            <div class="logo">⟨dev<span>learn</span>⟩</div>
            <div class="logo-sub" id="logoSub">Your personal coding learning system</div>

            <!-- Feature pills — shown on fresh visit, hidden when redirected from app -->
            <div id="featurePills" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 4px">
                <span class="pill">📚 61 Topics</span>
                <span class="pill">✍️ 1,220 Problems</span>
                <span class="pill">🔍 Step Tracer</span>
                <span class="pill">🔀 Flowcharts</span>
                <span class="pill">⚡ Code Runner</span>
                <span class="pill">🗺 Roadmaps</span>
            </div>
        </div>

        <!-- OAuth error from URL -->
        <div class="url-error" id="urlError"></div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab"        onclick="switchTab('register')">Create Account</div>
        </div>

        <!-- ── LOGIN PANEL ── -->
        <div class="form-panel active" id="panelLogin">
            <!-- Google -->
            <button class="btn-google" onclick="loginWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider">or sign in with email</div>

            <div class="alert error" id="loginError"></div>

            <div class="field">
                <label>Email address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"
                           onkeydown="if(event.key==='Enter') doLogin()"/>
                    <button class="pw-toggle" type="button" onclick="togglePassword('loginPassword',this)">👁</button>
                </div>
            </div>
            <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
        </div>

        <!-- ── REGISTER PANEL ── -->
        <div class="form-panel" id="panelRegister">
            <button class="btn-google" onclick="loginWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Sign up with Google
            </button>

            <div class="divider">or create with email</div>

            <div class="alert error"   id="regError"></div>
            <div class="alert success" id="regSuccess"></div>

            <div class="field">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Alice Smith" autocomplete="name"/>
            </div>
            <div class="field">
                <label>Email address</label>
                <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" id="regPassword" placeholder="At least 6 characters"
                           oninput="checkStrength(this.value)"
                           onkeydown="if(event.key==='Enter') doRegister()"/>
                    <button class="pw-toggle" type="button" onclick="togglePassword('regPassword',this)">👁</button>
                </div>
                <div class="strength-bar" id="strengthBar"></div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>
            <button class="btn-primary" id="regBtn" onclick="doRegister()">Create Account</button>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <a href="/">← Back to app</a>
            &nbsp;·&nbsp;
            By signing in you agree to learn a lot
        </div>
    </div>
</div>

<script>
// ── Tab switching ───────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', (tab === 'login' ? 0 : 1) === i));
  document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
  document.getElementById('panelRegister').classList.toggle('active', tab === 'register');
  clearAlerts();
}

// ── Google OAuth ────────────────────────────────────────────────────────────
function loginWithGoogle() {
  window.location.href = '/oauth2/authorization/google';
}

// ── Login ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) { showError('loginError', 'Please fill in all fields'); return; }

  setLoading(btn, true);
  clearAlerts();
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Login failed');
    saveAndRedirect(data);
  } catch (e) {
    showError('loginError', e.message);
    setLoading(btn, false);
  }
}

// ── Register ────────────────────────────────────────────────────────────────
async function doRegister() {
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const btn      = document.getElementById('regBtn');

  if (!name)                { showError('regError', 'Name is required'); return; }
  if (!email)               { showError('regError', 'Email is required'); return; }
  if (password.length < 6)  { showError('regError', 'Password must be at least 6 characters'); return; }

  setLoading(btn, true);
  clearAlerts();
  try {
    const res  = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Registration failed');
    saveAndRedirect(data);
  } catch (e) {
    showError('regError', e.message);
    setLoading(btn, false);
  }
}

// ── Save JWT + redirect ─────────────────────────────────────────────────────
function saveAndRedirect(data) {
  localStorage.setItem('devlearn_token', data.token);
  localStorage.setItem('devlearn_user', JSON.stringify({
    id:     data.id,
    name:   data.name,
    email:  data.email,
    role:   data.role,
    avatar: data.avatarUrl || '',
    streak: data.streakDays || 0,
    solved: data.problemsSolved || 0,
  }));
  // Return to the page they came from — default to app home
  const params   = new URLSearchParams(window.location.search);
  const returnTo = params.get('from');
  // Safety: only redirect to same-origin paths (no external URL injection)
  const safe = (returnTo && returnTo.startsWith('/') && !returnTo.startsWith('//'))
    ? returnTo : '/';
  window.location.replace(safe);
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function setLoading(btn, on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span>Please wait…'
    : (btn.id === 'loginBtn' ? 'Sign In' : 'Create Account');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

function clearAlerts() {
  document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else                           { input.type = 'password'; btn.textContent = '👁'; }
}

function checkStrength(password) {
  const bar   = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  if (!password) { bar.removeAttribute('data-strength'); label.textContent = ''; return; }
  const strong = password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password);
  const medium = password.length >= 6;
  if (strong)       { bar.dataset.strength = 'strong'; label.textContent = 'Strong password'; label.style.color = 'var(--accent)'; }
  else if (medium)  { bar.dataset.strength = 'medium'; label.textContent = 'Could be stronger'; label.style.color = 'var(--yellow)'; }
  else              { bar.dataset.strength = 'weak';   label.textContent = 'Too short'; label.style.color = 'var(--red)'; }
}

// ── Handle OAuth token in URL (?token=...) ───────────────────────────────────
(function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);

  // Error from OAuth
  const error = params.get('error');
  if (error) {
    const el = document.getElementById('urlError');
    el.textContent = 'Google sign-in failed. Please try again or use email.';
    el.classList.add('show');
    return;
  }

  // Token from OAuth success redirect
  const token = params.get('token');
  if (token) {
    // Fetch user profile with the token, then store and redirect
    fetch('/api/auth/check', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.json()).then(data => {
      localStorage.setItem('devlearn_token', token);
      localStorage.setItem('devlearn_user', JSON.stringify({
        id:     data.id,
        name:   data.name,
        email:  data.email,
        role:   data.role,
        roles:  data.roles || [],
        avatar: data.avatar || '',
        // /api/auth/check now returns these correctly (Bug #5 fix)
        streak: data.streakDays     || 0,
        solved: data.problemsSolved || 0,
      }));
      const params2   = new URLSearchParams(window.location.search);
      const returnTo2 = params2.get('from');
      const safe2     = (returnTo2 && returnTo2.startsWith('/') && !returnTo2.startsWith('//'))
        ? returnTo2 : '/';
      window.location.replace(safe2);
    }).catch(() => {
      // /api/auth/check failed — store token only, streak/solved will load on next syncToken()
      localStorage.setItem('devlearn_token', token);
      const params3   = new URLSearchParams(window.location.search);
      const returnTo3 = params3.get('from');
      const safe3     = (returnTo3 && returnTo3.startsWith('/') && !returnTo3.startsWith('//'))
        ? returnTo3 : '/';
      window.location.replace(safe3);
    });
    return;
  }

  // Already logged in — redirect to destination or home
  const existingToken = localStorage.getItem('devlearn_token');
  if (existingToken) {
    const params   = new URLSearchParams(window.location.search);
    const returnTo = params.get('from');
    const safe     = (returnTo && returnTo.startsWith('/') && !returnTo.startsWith('//'))
      ? returnTo : '/';
    window.location.replace(safe);
    return;
  }

  // Adapt UI based on whether this is a direct visit or a redirect from the app
  const fromParam = new URLSearchParams(window.location.search).get('from');
  if (fromParam) {
    // Redirected from inside the app — show focused "sign in to continue" message
    document.getElementById('featurePills').style.display = 'none';
    document.getElementById('logoSub').textContent = 'Sign in to continue';
    // Show a soft banner
    const banner = document.createElement('div');
    banner.style.cssText = 'margin:0 28px 4px;padding:8px 12px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:8px;font-size:12px;color:var(--blue,#60a5fa);text-align:center';
    banner.textContent = '🔐 Sign in to access DevLearn';
    document.querySelector('.tabs').before(banner);
  }
})();
</script>
</body>
</html>
