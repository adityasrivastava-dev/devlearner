server.port=8081

# ── Execution concurrency ─────────────────────────────────────────────────────
execution.max-concurrent=25
execution.max-processes=16

# ── Docker execution — ON by default in this service ─────────────────────────
# This service is meant to run on a host with Docker daemon available.
# Pull the image before starting: docker pull eclipse-temurin:17-jre-alpine
#
# Env var overrides:
#   DOCKER_ENABLED=false   → fall back to bare JVM (for local dev without Docker)
#   DOCKER_IMAGE=...       → use a different JRE image
#   DOCKER_MEMORY_MB=...   → memory limit per container (default 256)
#   DOCKER_CPUS=...        → CPU fraction per container (default 0.5)
execution.docker.enabled=${DOCKER_ENABLED:true}
execution.docker.image=${DOCKER_IMAGE:eclipse-temurin:17-jre-alpine}
execution.docker.memory-mb=${DOCKER_MEMORY_MB:256}
execution.docker.cpus=${DOCKER_CPUS:0.5}
execution.docker.timeout-seconds=${DOCKER_TIMEOUT_SECONDS:15}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.execservice=INFO
logging.level.org.springframework.web=WARN

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── JSON ─────────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ── No DB, no security, no JPA ───────────────────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
